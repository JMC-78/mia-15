<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quinceañera RSVP</title>
  
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://mia15.com"> 
  <meta property="og:title" content="Mia's Quinceañera RSVP ✨">
  <meta property="og:description" content="Please respond by Sunday, July 26th to celebrate with us!">
  <meta property="og:image" content="https://lh3.googleusercontent.com/d/12GORHXtWUM79iIqx1wS8gQU2lj7OdG2X">
  <meta property="og:image:secure_url" content="https://lh3.googleusercontent.com/d/12GORHXtWUM79iIqx1wS8gQU2lj7OdG2X">
  <meta property="og:image:type" content="image/jpeg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Mia's Quinceañera RSVP ✨">
  <meta name="twitter:description" content="Please respond by Sunday, July 26th to celebrate with us!">
  <meta name="twitter:image" content="https://lh3.googleusercontent.com/d/12GORHXtWUM79iIqx1wS8gQU2lj7OdG2X">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght=500&display=swap" rel="stylesheet">
</head>

<style>
  html {
    scroll-behavior: smooth;
  }

  body {
    margin: 0;
    font-family: 'Playfair Display', serif;
    background-color: #fff6ed; 
    overflow-x: hidden;
  }

  /* Immersive scroll track utilizing warm sunset tones */
  .scroll-track {
    position: relative;
    height: 220vh; 
    background: linear-gradient(rgba(255, 246, 237, 0.6), rgba(255, 246, 237, 0.85));
    z-index: 1;
  }

  /* Fixed view container - High layer priority ensures it stays on top of stars */
  .hero-section {
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    box-sizing: border-box;
    padding: 10px 20px 45px 20px;
    z-index: 10; /* Elevated above background elements and star layers */
    background: transparent;
    overflow: hidden;
    pointer-events: none; 
  }

  /* Invitation image scaling configuration */
  .hero-image {
    max-width: 92%; 
    max-height: 80vh;
    object-fit: contain;
    box-shadow: 0 12px 40px rgba(217, 115, 62, 0.12);
    border-radius: 8px;
    transform-origin: center center;
    will-change: transform;
    transform: scale(1) translateZ(0);
    pointer-events: auto; 
  }

  /* Fancy Floating Scroll Reminder Side-Badge */
  .fancy-reminder {
    position: fixed;
    bottom: 30px;
    right: 25px;
    z-index: 15;
    background: rgba(255, 255, 255, 0.95);
    padding: 10px 16px;
    border-radius: 30px;
    border: 1px solid rgba(217, 115, 62, 0.25);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 8px 24px rgba(217, 115, 62, 0.1);
    display: flex;
    align-items: center;
    gap: 8px;
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
    animation: gentleFloat 3s ease-in-out infinite;
  }

  .fancy-reminder span {
    font-size: 11px;
    color: #8c5535;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: bold;
  }

  .fancy-reminder .arrow {
    color: #d9733e;
    font-size: 12px;
    display: inline-block;
    animation: pointDown 1.5s ease-in-out infinite;
  }

  @keyframes gentleFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  @keyframes pointDown {
    0%, 100% { transform: translateY(-1px); }
    50% { transform: translateY(2px); }
  }

  @media (max-width: 480px) {
    .hero-section {
      padding-bottom: 60px;
    }
    .fancy-reminder {
      bottom: 24px;
      right: 50%;
      transform: translateX(50%);
      animation: gentleFloatMobile 3s ease-in-out infinite;
    }
  }

  @keyframes gentleFloatMobile {
    0%, 100% { transform: translateX(50%) translateY(0); }
    50% { transform: translateX(50%) translateY(-4px); }
  }

  /* RSVP Container transitioning into the vanilla cream shade with light amber-glow gradient */
  .rsvp-container {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 60px 24px;
    box-sizing: border-box;
    z-index: 20; 
    background-color: #fff6ed; 
    background-image: radial-gradient(circle at center, rgba(217, 115, 62, 0.08) 0%, rgba(255, 246, 237, 0) 70%);
  }

  /* Frosted Glassmorphism RSVP Card style matching lighter sunset accents */
  .card {
    background: rgba(255, 255, 255, 0.92);
    padding: 2.5rem 2rem;
    border-radius: 24px;
    max-width: 420px;
    width: 100%;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(217, 115, 62, 0.18);
    box-shadow: 0 30px 60px rgba(120, 60, 20, 0.05), 
                0 12px 24px rgba(217, 115, 62, 0.03);
    text-align: center;
  }

  h1 {
    margin-top: 0;
    margin-bottom: 0.4rem;
    font-size: 26px;
    color: #d9733e; 
    letter-spacing: 0.5px;
  }

  p {
    margin-top: 0;
    margin-bottom: 1.8rem;
    color: #8c5535;
    font-size: 16px;
  }

  strong {
    color: #d9733e;
    font-weight: 600;
  }

  input, button {
    width: 100%;
    padding: 14px 16px; 
    margin-top: 12px;
    font-size: 16px;
    border-radius: 12px;
    border: 1px solid rgba(217, 115, 62, 0.25);
    box-sizing: border-box;
    background-color: #ffffff;
    font-family: inherit;
    color: #5e3b25;
    transition: all 0.2s ease;
  }

  input::placeholder {
    color: #c9b0a1;
  }

  /* Focus state with lighter glow */
  input:focus {
    outline: none;
    border-color: #d9733e;
    box-shadow: 0 0 0 4px rgba(217, 115, 62, 0.15);
  }

  /* Lighter, brighter sunset button layout */
  button {
    background: linear-gradient(135deg, #e68550 0%, #d9733e 100%);
    color: #ffffff;
    border: none;
    cursor: pointer;
    margin-top: 24px;
    font-weight: bold;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    font-size: 14px;
    box-shadow: 0 6px 20px rgba(217, 115, 62, 0.22);
  }

  button:hover {
    background: linear-gradient(135deg, #d9733e 0%, #c4602b 100%);
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(217, 115, 62, 0.3);
  }
  
  button:active {
    transform: translateY(1px);
  }

  .hint {
    font-size: 13px;
    margin-top: 8px;
    color: #a37c65;
    text-align: left;
    padding-left: 4px;
  }

  .status {
    margin-top: 16px;
    font-size: 15px;
    color: #d9733e;
    font-weight: bold;
    min-height: 20px;
  }

  .deadline {
    font-size: 14px;
    margin-top: 20px;
    color: #a37c65;
    border-top: 1px solid rgba(217, 115, 62, 0.1);
    padding-top: 16px;
  }

  /* Autocomplete Dropdown Styling */
  .autocomplete {
    position: relative;
    width: 100%;
  }

  .suggestions {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    background: #ffffff;
    border: 1px solid rgba(217, 115, 62, 0.25);
    border-radius: 12px;
    box-shadow: 0 16px 40px rgba(120, 60, 20, 0.1);
    max-height: 200px;
    overflow-y: auto;
    z-index: 100;
    -webkit-overflow-scrolling: touch;
  }

  .suggestion-item {
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    cursor: pointer;
    border-bottom: 1px solid #fff6ed;
    text-align: left;
  }

  .suggestion-item:last-child {
    border-bottom: none;
  }

  .suggestion-item:hover {
    background: #fff6ed;
  }

  .suggestion-name {
    font-size: 16px;
    color: #5e3b25;
  }

  .suggestion-meta {
    font-size: 14px;
    color: #d9733e;
    font-weight: bold;
  }

  .guest-field {
    width: 100%;
    padding: 14px 16px;
    margin-top: 12px;
    font-size: 16px;
    border-radius: 12px;
    border: 1px solid rgba(217, 115, 62, 0.25);
  }
  
  /* CRITICAL FIX: Sparkle wrapper nested directly below the image layer structure */
  #sparkles {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh; /* Keeps stars rendering strictly on the top half screen */
    pointer-events: none;
    overflow: hidden;
    z-index: 2; /* Lower than hero-section (10), hidden cleanly behind invitation */
  }

  /* Elegant Golden Yellow Stars matched to invitation graphics */
  .sparkle {
    position: absolute;
    top: -20px;
    width: 14px;
    height: 14px;
    background: #f1c40f;
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    box-shadow: 0 0 8px rgba(241, 196, 15, 0.8);
    animation: fall linear infinite, twinkle ease-in-out infinite;
  }

  @keyframes fall { to { transform: translateY(105vh) rotate(360deg); opacity: 0; } }
  @keyframes twinkle { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
</style>
<body>

  <div class="scroll-track">
    <div id="sparkles"></div>

    <div class="hero-section" id="heroSection">
      <img id="heroImage" class="hero-image" src="https://lh3.googleusercontent.com/d/12GORHXtWUM79iIqx1wS8gQU2lj7OdG2X" alt="Mia's Quinceañera Invitation">
      
      <div class="fancy-reminder" id="scrollReminder">
        <span>Keep Scrolling for RSVP</span>
        <div class="arrow">▼</div>
      </div>
    </div>
  </div>

  <div class="rsvp-container" id="rsvp">
    <div class="card">
      <h1>Mia's Quinceañera RSVP</h1>
      <p>Please respond by <strong>Sunday, July 26th</strong></p>

      <form id="rsvpForm">
        <div class="autocomplete" id="autocompleteContainer">
          <input
            id="nameInput"
            name="name"
            type="text"
            placeholder="Start typing your name"
            autocomplete="off"
            required
          />
          <div id="suggestions" class="suggestions" hidden></div>
          <div class="hint" id="maxHint" style="color: #d9733e;">🔍 Connecting to guest list... You can still start typing.</div>
        </div>

        <div id="guestMessage" style="font-size: 14px; color: #8c5535; margin: 16px 0 4px 0; font-weight: 500; text-align: left; line-height: 1.4;"></div>
        
        <div id="guestFields"></div>
        <input type="hidden" id="guestNamesHidden" name="guestNames">

        <button type="submit" id="submitBtn">Submit RSVP</button>
        <div class="status" id="status"></div>
      </form>

      <div class="deadline">Thank you for celebrating with us ✨</div>
    </div>
  </div>

  <script>
    const heroImage = document.getElementById("heroImage");
    const scrollReminder = document.getElementById("scrollReminder");

    let ticking = false;

    function updateZoom() {
      const scrollPosition = window.scrollY;
      const maxScrollDistance = window.innerHeight * 1.2;
      const progress = Math.min(scrollPosition / maxScrollDistance, 1);

      const scaleValue = 1 + (progress * 0.12);
      heroImage.style.transform = `scale(${scaleValue}) translateZ(0)`;

      if (progress > 0.35) {
        scrollReminder.style.opacity = "0";
        if (window.innerWidth <= 480) {
          scrollReminder.style.transform = "translateX(50%) translateY(10px)";
        } else {
          scrollReminder.style.transform = "translateY(10px)";
        }
      } else {
        scrollReminder.style.opacity = "1";
        if (window.innerWidth <= 480) {
          scrollReminder.style.transform = "translateX(50%) translateY(0)";
        } else {
          scrollReminder.style.transform = "translateY(0)";
        }
      }

      ticking = false;
    }

    window.addEventListener("scroll", () => {
      if (!ticking) {
        window.requestAnimationFrame(updateZoom);
        ticking = true;
      }
    }, { passive: true });
  </script>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbwUfDke5G01oT4V88XA0YYEZota7uRnHfEU0v46dsSaKSgqusxh8AEwqjq18ezOO3F8/exec";

    const nameInput = document.getElementById("nameInput");
    const submitBtn = document.getElementById("submitBtn");
    const suggestionsEl = document.getElementById("suggestions");
    const maxHint = document.getElementById("maxHint");
    const guestFieldsEl = document.getElementById("guestFields");
    const guestNamesHidden = document.getElementById("guestNamesHidden");
    const statusEl = document.getElementById("status");
    const autocompleteContainer = document.getElementById("autocompleteContainer");
    const guestMessageEl = document.getElementById("guestMessage");

    const guestMap = new Map();
    let guestList = [];
    let isLoadedSuccessfully = false;

    function setStatus(msg) { statusEl.textContent = msg || ""; }

    function escapeHtml(str) {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
      return String(str).replace(/[&<>"']/g, m => map[m]);
    }

    function renderGuestFields(max) {
      guestFieldsEl.innerHTML = "";
      for (let i = 1; i <= max; i++) {
        const input = document.createElement("input");
        input.className = "guest-field";
        input.placeholder = `Guest ${i} Full Name`;
        if (i === 1) input.required = true;
        guestFieldsEl.appendChild(input);
      }
    }

    function handleSelection(name, max) {
      nameInput.value = name;
      suggestionsEl.hidden = true;
      maxHint.style.color = "#8c5535";
      maxHint.textContent = `Max allowed: ${max}`;
      
      // Update dynamic generalized verification statement
      if (max === 1) {
        guestMessageEl.innerHTML = `✨ <strong>${escapeHtml(name)}</strong>, your reservation is confirmed! Please specify the name of your +1 below:`;
      } else if (max > 1) {
        guestMessageEl.innerHTML = `✨ <strong>${escapeHtml(name)}</strong>, your reservation is confirmed! Please specify the names of your ${max} guests below:`;
      } else {
        guestMessageEl.innerHTML = `✨ <strong>${escapeHtml(name)}</strong>, your reservation is confirmed!`;
      }

      renderGuestFields(max);
    }

    function renderSuggestions(items) {
      suggestionsEl.innerHTML = "";
      if (items.length === 0) {
        suggestionsEl.hidden = true;
        return;
      }

      items.forEach(({ name, max }) => {
        const row = document.createElement("div");
        row.className = "suggestion-item";
        row.innerHTML = `
          <div class="suggestion-name">${escapeHtml(name)}</div>
          <div class="suggestion-meta">Max ${max}</div>
        `;
        
        row.addEventListener("click", () => handleSelection(name, max));
        row.addEventListener("touchend", (e) => {
          if (!window.isScrollingDropdown) {
            e.preventDefault();
            handleSelection(name, max);
          }
        });

        suggestionsEl.appendChild(row);
      });
      suggestionsEl.hidden = false;
    }

    // Fetch the data from Google Sheets safely
    fetch(scriptURL)
      .then(res => res.json())
      .then(data => {
        guestList = data.map(g => ({ name: g.name, max: Number(g.maxGuests) }));
        data.forEach(g => guestMap.set(g.name.toLowerCase(), Number(g.maxGuests)));
        isLoadedSuccessfully = true;
        
        maxHint.style.color = "#27ae60"; 
        maxHint.innerHTML = "✨ <strong>Connected!</strong> Select your name from the dropdown list.";
        
        setTimeout(() => {
          maxHint.style.color = "#a37c65";
          maxHint.textContent = "Type your name and select it from the list.";
        }, 4000);
      })
      .catch(err => {
        console.error("Database fallback system enabled:", err);
        maxHint.style.color = "#a37c65";
        maxHint.textContent = "Type your name and fill out your party details below.";
        
        if (guestFieldsEl.children.length === 0) {
          renderGuestFields(2); 
        }
      });

    nameInput.addEventListener("input", () => {
      const q = nameInput.value.toLowerCase().trim();
      if (!q || !isLoadedSuccessfully) {
        suggestionsEl.hidden = true;
        return;
      }
      renderSuggestions(
        guestList.filter(g => g.name.toLowerCase().includes(q))
      );
    });

    window.isScrollingDropdown = false;
    suggestionsEl.addEventListener("touchmove", () => { window.isScrollingDropdown = true; });
    suggestionsEl.addEventListener("touchstart", () => { window.isScrollingDropdown = false; });

    document.addEventListener("click", e => {
      if (!autocompleteContainer.contains(e.target)) {
        suggestionsEl.hidden = true;
      }
    });

    document.getElementById("rsvpForm").addEventListener("submit", e => {
      e.preventDefault();
      setStatus("Submitting RSVP...");
      
      // Auto collapses double spaces or structural anomalies out of manually typed text entry strings
      const searchName = nameInput.value.replace(/\s+/g, ' ').trim().toLowerCase();
      let max = guestMap.get(searchName);

      if (!isLoadedSuccessfully) {
        max = guestFieldsEl.querySelectorAll(".guest-field").length || 2;
      } else if (!max) {
        setStatus("");
        // Fuzzy entry layout tracking match check
        for (let [key, value] of guestMap.entries()) {
          if (key.includes(searchName) || searchName.includes(key)) {
            max = value;
            break;
          }
        }
        
        if (!max) {
          max = guestFieldsEl.querySelectorAll(".guest-field").length || 5;
        }
      }

      const names = [...guestFieldsEl.querySelectorAll(".guest-field")]
        .map(i => i.value.trim())
        .filter(Boolean);

      if (!names.length || names.length > max) {
        setStatus("");
        return alert(`Please fill in your guest options (Up to ${max} slots available).`);
      }

      guestNamesHidden.value = names.join("\n");

      fetch(scriptURL, { method: "POST", body: new FormData(e.target) })
        .then(res => res.text())
        .then(msg => {
          setStatus("");
          alert(msg === "Success" ? "RSVP submitted successfully!" : msg);
          if (msg === "Success") {
            document.getElementById("rsvpForm").reset();
            guestFieldsEl.innerHTML = "";
            guestMessageEl.innerHTML = ""; // Clean out the reassurance text banner layout explicitly on reset
            maxHint.textContent = "Type your name and select it from the list.";
          }
        })
        .catch(err => {
          console.error(err);
          setStatus("Submission failed. Please try again.");
        });
    });
  </script>

  <script>
    const sparkleContainer = document.getElementById("sparkles");
    function createStar() {
      const star = document.createElement("div");
      star.className = "sparkle";
      const size = Math.random() * 4 + 6;
      star.style.width = `${size}px`;
      star.style.height = `${size}px`;
      star.style.left = Math.random() * 100 + "vw";
      star.style.animationDuration = (Math.random() * 5 + 6) + "s";
      star.style.animationDelay = (Math.random() * 2) + "s";
      sparkleContainer.appendChild(star);
      setTimeout(() => { star.remove(); }, 12000);
    }
    setInterval(createStar, 380);
  </script>
</body>
</html>
