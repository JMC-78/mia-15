<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quinceañera RSVP</title>
  
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://mia15.com"> 
  <meta property="og:title" content="Mia's Quinceañera RSVP ✨">
  <meta property="og:description" content="Please respond by Sunday, July 26th to celebrate with us!">
  <meta property="og:image" content="https://lh3.googleusercontent.com/d/12GORHXtWUM79iIqx1wS8gQU2lj7OdG2X">
  <meta property="og:image:secure_url" content="https://lh3.googleusercontent.com/d/12GORHXtWUM79iIqx1wS8gQU2lj7OdG2X">
  <meta property="og:image:type" content="image/jpeg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Mia's Quinceañera RSVP ✨">
  <meta name="twitter:description" content="Please respond by Sunday, July 26th to celebrate with us!">
  <meta name="twitter:image" content="https://lh3.googleusercontent.com/d/12GORHXtWUM79iIqx1wS8gQU2lj7OdG2X">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght=500&display=swap" rel="stylesheet">
</head>

  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: 'Playfair Display', serif;
      background-color: #ffffff;
      overflow-x: hidden;
    }

    /* Track shares the global immersive background to fill initial spaces */
    .scroll-track {
      position: relative;
      height: 250vh; 
      background:
        linear-gradient(rgba(255,255,255,0.75), rgba(255,255,255,0.75)),
        url('https://wallpapers.com/images/hd/quinceanera-background-l0wmycdz116qhiks.jpg');
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      background-attachment: fixed;
      z-index: 1;
    }

    /* Hero view container pins perfectly with transparent background to let the artwork shine through */
    .hero-section {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
      padding: 10px 20px 45px 20px;
      z-index: 2;
      background: transparent;
      overflow: hidden;
    }

    /* Immersive Invitation Canvas */
    .hero-image {
      max-width: 100%;
      max-height: 82vh;
      object-fit: contain;
      box-shadow: 0 12px 40px rgba(0,0,0,0.12);
      border-radius: 6px;
      transform-origin: center center;
      will-change: transform;
      transform: scale(1) translateZ(0);
    }

    /* Fancy Floating Scroll Reminder Side-Badge */
    .fancy-reminder {
      position: fixed;
      bottom: 25px;
      right: 25px;
      z-index: 5;
      background: rgba(255, 255, 255, 0.92);
      padding: 8px 14px;
      border-radius: 30px;
      border: 1px solid rgba(123, 182, 230, 0.3);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(123, 182, 230, 0.15);
      display: flex;
      align-items: center;
      gap: 6px;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      animation: gentleFloat 3s ease-in-out infinite;
    }

    .fancy-reminder span {
      font-size: 11px;
      color: #5f6f82;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: bold;
    }

    .fancy-reminder .arrow {
      color: #7bb6e6;
      font-size: 12px;
      display: inline-block;
      animation: pointDown 1.5s ease-in-out infinite;
    }

    @keyframes gentleFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    @keyframes pointDown {
      0%, 100% { transform: translateY(-1px); }
      50% { transform: translateY(2px); }
    }

    /* Responsive overrides for smaller phone viewports */
    @media (max-width: 480px) {
      .hero-section {
        padding-bottom: 60px;
      }
      .fancy-reminder {
        bottom: 20px;
        right: 50%;
        transform: translateX(50%);
        animation: gentleFloatMobile 3s ease-in-out infinite;
      }
    }

    @keyframes gentleFloatMobile {
      0%, 100% { transform: translateX(50%) translateY(0); }
      50% { transform: translateX(50%) translateY(-4px); }
    }

    /* RSVP Section Container elevated to z-index 20 to ensure autocomplete drop-down floats on top */
    .rsvp-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 80px 24px;
      box-sizing: border-box;
      z-index: 20; 
      background:
        linear-gradient(rgba(255,255,255,0.82), rgba(255,255,255,0.82)),
        url('https://wallpapers.com/images/hd/quinceanera-background-l0wmycdz116qhiks.jpg');
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      background-attachment: fixed;
      box-shadow: 0 -30px 50px rgba(0,0,0,0.15); 
    }

    .card {
      background: rgba(255,255,255,0.97);
      padding: 2.5rem;
      border-radius: 16px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 30px 60px rgba(0,0,0,0.12);
      text-align: center;
    }

    h1 {
      margin-bottom: 0.3rem;
      font-size: 28px;
      color: #7bb6e6;
    }

    p {
      margin-bottom: 1.5rem;
      color: #5f6f82;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: #7bb6e6;
    }

    button {
      background: #7bb6e6;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 18px;
    }

    button:hover {
      background: #5aa0db;
    }

    .hint {
      font-size: 13px;
      margin-top: 8px;
      color: #5f6f82;
      text-align: left;
    }

    .status {
      margin-top: 14px;
      font-size: 14px;
      color: #5f6f82;
      min-height: 18px;
    }

    .deadline {
      font-size: 14px;
      margin-top: 15px;
      color: #5f6f82;
    }

    /* Autocomplete Styling - Scrollable setup */
    .autocomplete {
      position: relative;
      width: 100%;
    }

    .suggestions {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.98);
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.12);
      max-height: 200px;
      overflow-y: auto;
      z-index: 100;
      -webkit-overflow-scrolling: touch;
    }

    .suggestion-item {
      padding: 12px;
      display: flex;
      justify-content: space-between;
      cursor: pointer;
      border-bottom: 1px solid #f1f1f1;
    }

    .suggestion-item:hover {
      background: #f2f8fd;
    }

    .suggestion-name {
      font-size: 16px;
      color: #222;
    }

    .suggestion-meta {
      font-size: 14px;
      color: #7bb6e6;
    }

    .guest-field {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    
    #sparkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 11;
    }

    .sparkle {
      position: absolute;
      top: -20px;
      width: 14px;
      height: 14px;
      background: rgba(123, 182, 230, 0.9);
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      box-shadow: 0 0 8px rgba(123,182,230,0.9), 0 0 16px rgba(123,182,230,0.7), 0 0 24px rgba(123,182,230,0.4);
      animation: fall linear infinite, twinkle ease-in-out infinite;
    }

    @keyframes fall { to { transform: translateY(115vh) rotate(360deg); opacity: 0; } }
    @keyframes twinkle { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
  </style>
</head>

<body>
  <div id="sparkles"></div>

  <div class="scroll-track">
    <div class="hero-section" id="heroSection">
      <img id="heroImage" class="hero-image" src="https://lh3.googleusercontent.com/d/12GORHXtWUM79iIqx1wS8gQU2lj7OdG2X" alt="Mia's Quinceañera Invitation">
      
      <div class="fancy-reminder" id="scrollReminder">
        <span>Keep Scrolling for RSVP</span>
        <div class="arrow">▼</div>
      </div>
    </div>
  </div>

  <div class="rsvp-container" id="rsvp">
    <div class="card">
      <h1>Mia's Quinceañera RSVP</h1>
      <p>Please respond by <strong> Sunday, July 26th</strong></p>

      <form id="rsvpForm">
        <div class="autocomplete" id="autocompleteContainer">
          <input
            id="nameInput"
            name="name"
            type="text"
            placeholder="Start typing your name"
            autocomplete="off"
            required
          />
          <div id="suggestions" class="suggestions" hidden></div>
          <div class="hint" id="maxHint">Type your name and select it from the list.</div>
        </div>

        <div id="guestFields"></div>
        <input type="hidden" id="guestNamesHidden" name="guestNames">

        <button type="submit">Submit RSVP</button>
        <div class="status" id="status"></div>
      </form>

      <div class="deadline">Thank you for celebrating with us ✨</div>
    </div>
  </div>

  <script>
    const heroImage = document.getElementById("heroImage");
    const scrollReminder = document.getElementById("scrollReminder");

    let ticking = false;

    function updateZoom() {
      const scrollPosition = window.scrollY;
      
      const maxScrollDistance = window.innerHeight * 1.3;
      const progress = Math.min(scrollPosition / maxScrollDistance, 1);

      const scaleValue = 1 + (progress * 0.60);
      heroImage.style.transform = `scale(${scaleValue}) translateZ(0)`;

      if (progress > 0.4) {
        scrollReminder.style.opacity = "0";
        if (window.innerWidth <= 480) {
          scrollReminder.style.transform = "translateX(50%) translateY(10px)";
        } else {
          scrollReminder.style.transform = "translateY(10px)";
        }
      } else {
        scrollReminder.style.opacity = "1";
        if (window.innerWidth <= 480) {
          scrollReminder.style.transform = "translateX(50%) translateY(0)";
        } else {
          scrollReminder.style.transform = "translateY(0)";
        }
      }

      ticking = false;
    }

    window.addEventListener("scroll", () => {
      if (!ticking) {
        window.requestAnimationFrame(updateZoom);
        ticking = true;
      }
    }, { passive: true });
  </script>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbwUfDke5G01oT4V88XA0YYEZota7uRnHfEU0v46dsSaKSgqusxh8AEwqjq18ezOO3F8/exec";

    const nameInput = document.getElementById("nameInput");
    const suggestionsEl = document.getElementById("suggestions");
    const maxHint = document.getElementById("maxHint");
    const guestFieldsEl = document.getElementById("guestFields");
    const guestNamesHidden = document.getElementById("guestNamesHidden");
    const statusEl = document.getElementById("status");
    const autocompleteContainer = document.getElementById("autocompleteContainer");

    const guestMap = new Map();
    let guestList = [];

    function setStatus(msg) { statusEl.textContent = msg || ""; }

    // FIXED SYNTAX: Properly mapped character transformations to prevent engine crash
    function escapeHtml(str) {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
      return String(str).replace(/[&<>"']/g, m => map[m]);
    }

    function renderGuestFields(max) {
      guestFieldsEl.innerHTML = "";
      for (let i = 1; i <= max; i++) {
        const input = document.createElement("input");
        input.className = "guest-field";
        input.placeholder = `Guest ${i} Full Name`;
        if (i === 1) input.required = true;
        guestFieldsEl.appendChild(input);
      }
    }

    function renderSuggestions(items) {
      suggestionsEl.innerHTML = "";
      if (items.length === 0) {
        suggestionsEl.hidden = true;
        return;
      }

      items.forEach(({ name, max }) => {
        const row = document.createElement("div");
        row.className = "suggestion-item";
        row.innerHTML = `
          <div class="suggestion-name">${escapeHtml(name)}</div>
          <div class="suggestion-meta">Max ${max}</div>
        `;
        
        row.addEventListener("pointerdown", e => {
          e.preventDefault();
          nameInput.value = name;
          suggestionsEl.hidden = true;
          maxHint.textContent = `Max allowed: ${max}`;
          renderGuestFields(max);
        });
        suggestionsEl.appendChild(row);
      });
      suggestionsEl.hidden = false;
    }

    setStatus("Loading guest list...");
    fetch(scriptURL)
      .then(res => res.json())
      .then(data => {
        setStatus("");
        guestList = data.map(g => ({ name: g.name, max: Number(g.maxGuests) }));
        data.forEach(g => guestMap.set(g.name.toLowerCase(), Number(g.maxGuests)));
      })
      .catch(err => {
        console.error(err);
        setStatus("Error loading guest list. Please refresh.");
      });

    nameInput.addEventListener("input", () => {
      const q = nameInput.value.toLowerCase().trim();
      if (!q) {
        suggestionsEl.hidden = true;
        return;
      }
      renderSuggestions(
        guestList.filter(g => g.name.toLowerCase().includes(q))
      );
    });

    document.addEventListener("pointerdown", e => {
      if (!autocompleteContainer.contains(e.target)) {
        suggestionsEl.hidden = true;
      }
    });

    document.getElementById("rsvpForm").addEventListener("submit", e => {
      e.preventDefault();
      setStatus("Submitting RSVP...");
      
      const max = guestMap.get(nameInput.value.toLowerCase().trim());
      if (!max) return alert("Please select a valid name from the drop down list.");

      const names = [...guestFieldsEl.querySelectorAll(".guest-field")]
        .map(i => i.value.trim())
        .filter(Boolean);

      if (!names.length || names.length > max) {
        setStatus("");
        return alert(`Please enter up to ${max} guest names.`);
      }

      guestNamesHidden.value = names.join("\n");

      fetch(scriptURL, { method: "POST", body: new FormData(e.target) })
        .then(res => res.text())
        .then(msg => {
          setStatus("");
          alert(msg === "Success" ? "RSVP submitted!" : msg);
          if (msg === "Success") {
            document.getElementById("rsvpForm").reset();
            guestFieldsEl.innerHTML = "";
            maxHint.textContent = "Type your name and select it from the list.";
          }
        })
        .catch(err => {
          console.error(err);
          setStatus("Submission failed. Try again.");
        });
    });
  </script>

  <script>
    const sparkleContainer = document.getElementById("sparkles");
    function createStar() {
      const star = document.createElement("div");
      star.className = "sparkle";
      const size = Math.random() * 5 + 8;
      star.style.width = `${size}px`;
      star.style.height = `${size}px`;
      star.style.left = Math.random() * 100 + "vw";
      star.style.animationDuration = (Math.random() * 6 + 8) + "s";
      star.style.animationDelay = (Math.random() * 2) + "s";
      sparkleContainer.appendChild(star);
      setTimeout(() => { star.remove(); }, 16000);
    }
    setInterval(createStar, 300);
  </script>
</body>
</html>
