<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quinceañera RSVP</title>
  
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://mia15.com"> 
  <meta property="og:title" content="Mia's Quinceañera RSVP ✨">
  <meta property="og:description" content="Please respond by July 30th to celebrate with us!">
  <meta property="og:image" content="https://lh3.googleusercontent.com/d/1mPu_cXmiXyQn_1eS0f824ha2HlFEjd38"> 
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Mia's Quinceañera RSVP ✨">
  <meta name="twitter:description" content="Please respond by July 30th to celebrate with us!">
  <meta name="twitter:image" content="https://lh3.googleusercontent.com/d/1mPu_cXmiXyQn_1eS0f824ha2HlFEjd38">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Playfair Display', serif;
      background:
        linear-gradient(rgba(255,255,255,0.78), rgba(255,255,255,0.78)),
        url('https://wallpapers.com/images/hd/quinceanera-background-l0wmycdz116qhiks.jpg');
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      background-attachment: fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
    }

    .card {
      background: rgba(255,255,255,0.96);
      padding: 2.5rem;
      border-radius: 16px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.12);
      text-align: center;
      position: relative;
      z-index: 2;
    }

    h1 {
      margin-bottom: 0.3rem;
      font-size: 28px;
      color: #7bb6e6;
    }

    p {
      margin-bottom: 1.5rem;
      color: #5f6f82;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: #7bb6e6;
    }

    button {
      background: #7bb6e6;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 18px;
    }

    button:hover {
      background: #5aa0db;
    }

    .hint {
      font-size: 13px;
      margin-top: 8px;
      color: #5f6f82;
      text-align: left;
    }

    .status {
      margin-top: 14px;
      font-size: 14px;
      color: #5f6f82;
      min-height: 18px;
    }

    .deadline {
      font-size: 14px;
      margin-top: 15px;
      color: #5f6f82;
    }

    /* Autocomplete */
    .autocomplete {
      position: relative;
      width: 100%;
    }

    .suggestions {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.98);
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.12);
      max-height: 260px;
      overflow: auto;
      z-index: 50;
      -webkit-overflow-scrolling: touch;
    }

    .suggestion-item {
      padding: 12px;
      display: flex;
      justify-content: space-between;
      cursor: pointer;
      border-bottom: 1px solid #f1f1f1;
    }

    .suggestion-item:hover {
      background: #f2f8fd;
    }

    .suggestion-name {
      font-size: 16px;
      color: #222;
    }

    .suggestion-meta {
      font-size: 14px;
      color: #7bb6e6;
    }

    .guest-field {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    
    #sparkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .sparkle {
      position: absolute;
      top: -20px;
      width: 14px;
      height: 14px;
      background: rgba(123, 182, 230, 0.9);
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      box-shadow: 0 0 8px rgba(123,182,230,0.9), 0 0 16px rgba(123,182,230,0.7), 0 0 24px rgba(123,182,230,0.4);
      animation: fall linear infinite, twinkle ease-in-out infinite;
    }

    @keyframes fall { to { transform: translateY(115vh) rotate(360deg); opacity: 0; } }
    @keyframes twinkle { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
  </style>
</head>

<body>
  <div id="sparkles"></div>

  <div class="card">
    <h1>Mia's Quinceañera RSVP</h1>
    <p>Please respond by <strong>July 30th</strong></p>

    <form id="rsvpForm">
      <div class="autocomplete">
        <input
          id="nameInput"
          name="name"
          type="text"
          placeholder="Start typing your name"
          autocomplete="off"
          required
        />
        <div id="suggestions" class="suggestions" hidden></div>
        <div class="hint" id="maxHint">Type your name and select it from the list.</div>
      </div>

      <div id="guestFields"></div>
      <input type="hidden" id="guestNamesHidden" name="guestNames">

      <button type="submit">Submit RSVP</button>
      <div class="status" id="status"></div>
    </form>

    <div class="deadline">Thank you for celebrating with us ✨</div>
  </div>

  <script>
    // COPY AND PASTE YOUR NEW DEPLOYMENT LINK HERE:
    const scriptURL = "https://script.google.com/macros/s/AKfycbwUfDke5G01oT4V88XA0YYEZota7uRnHfEU0v46dsSaKSgqusxh8AEwqjq18ezOO3F8/exec";

    const nameInput = document.getElementById("nameInput");
    const suggestionsEl = document.getElementById("suggestions");
    const maxHint = document.getElementById("maxHint");
    const guestFieldsEl = document.getElementById("guestFields");
    const guestNamesHidden = document.getElementById("guestNamesHidden");
    const statusEl = document.getElementById("status");

    const guestMap = new Map();
    let guestList = [];

    function setStatus(msg) { statusEl.textContent = msg || ""; }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[m]));
    }

    function renderGuestFields(max) {
      guestFieldsEl.innerHTML = "";
      for (let i = 1; i <= max; i++) {
        const input = document.createElement("input");
        input.className = "guest-field";
        input.placeholder = `Guest ${i} Full Name`;
        if (i === 1) input.required = true;
        guestFieldsEl.appendChild(input);
      }
    }

    function renderSuggestions(items) {
      suggestionsEl.innerHTML = "";
      if (items.length === 0) {
        suggestionsEl.hidden = true;
        return;
      }

      items.forEach(({ name, max }) => {
        const row = document.createElement("div");
        row.className = "suggestion-item";
        row.innerHTML = `
          <div class="suggestion-name">${escapeHtml(name)}</div>
          <div class="suggestion-meta">Max ${max}</div>
        `;
        
        row.addEventListener("pointerdown", e => {
          e.preventDefault();
          nameInput.value = name;
          suggestionsEl.hidden = true;
          maxHint.textContent = `Max allowed: ${max}`;
          renderGuestFields(max);
        });
        suggestionsEl.appendChild(row);
      });
      suggestionsEl.hidden = false;
    }

    // Load setup data
    setStatus("Loading guest list...");
    fetch(scriptURL)
      .then(res => res.json())
      .then(data => {
        setStatus("");
        guestList = data.map(g => ({ name: g.name, max: Number(g.maxGuests) }));
        data.forEach(g => guestMap.set(g.name.toLowerCase(), Number(g.maxGuests)));
      })
      .catch(err => {
        console.error(err);
        setStatus("Error loading guest list. Please refresh.");
      });

    nameInput.addEventListener("input", () => {
      const q = nameInput.value.toLowerCase().trim();
      if (!q) {
        suggestionsEl.hidden = true;
        return;
      }
      renderSuggestions(
        guestList.filter(g => g.name.toLowerCase().includes(q)).slice(0, 8)
      );
    });

    nameInput.addEventListener("blur", () => {
      setTimeout(() => { suggestionsEl.hidden = true; }, 200);
    });

    document.getElementById("rsvpForm").addEventListener("submit", e => {
      e.preventDefault();
      setStatus("Submitting RSVP...");
      
      const max = guestMap.get(nameInput.value.toLowerCase().trim());
      if (!max) return alert("Please select a valid name from the drop down list.");

      const names = [...guestFieldsEl.querySelectorAll(".guest-field")]
        .map(i => i.value.trim())
        .filter(Boolean);

      if (!names.length || names.length > max) {
        setStatus("");
        return alert(`Please enter up to ${max} guest names.`);
      }

      guestNamesHidden.value = names.join("\n");

      fetch(scriptURL, { method: "POST", body: new FormData(e.target) })
        .then(res => res.text())
        .then(msg => {
          setStatus("");
          alert(msg === "Success" ? "RSVP submitted!" : msg);
          if (msg === "Success") {
            document.getElementById("rsvpForm").reset();
            guestFieldsEl.innerHTML = "";
            maxHint.textContent = "Type your name and select it from the list.";
          }
        })
        .catch(err => {
          console.error(err);
          setStatus("Submission failed. Try again.");
        });
    });
  </script>

  <script>
    const sparkleContainer = document.getElementById("sparkles");
    function createStar() {
      const star = document.createElement("div");
      star.className = "sparkle";
      const size = Math.random() * 5 + 8;
      star.style.width = `${size}px`;
      star.style.height = `${size}px`;
      star.style.left = Math.random() * 100 + "vw";
      star.style.animationDuration = (Math.random() * 6 + 8) + "s";
      star.style.animationDelay = (Math.random() * 2) + "s";
      sparkleContainer.appendChild(star);
      setTimeout(() => { star.remove(); }, 16000);
    }
    setInterval(createStar, 300);
  </script>
</body>
</html>
